server:
  port: 8081

spring:
  application:
    name: b2u-hub-gateway
  cloud:
    gateway:
      # CORS gere au niveau du Gateway : c'est lui que le navigateur appelle desormais,
      # le backend n'est plus appele directement par Angular.
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${b2u.cors.allowed-origins:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Toutes les routes REST de l'API backend
        - id: backend-api
          uri: ${b2u.backend.base-url:http://localhost:8080}
          predicates:
            - Path=/api/**
        # Notifications temps reel (WebSocket / STOMP) exposees par le backend
        - id: backend-ws
          uri: ${b2u.backend.base-url:http://localhost:8080}
          predicates:
            - Path=/ws/**

# URL de base du backend Spring Boot (le seul microservice "metier" derriere le gateway).
# Le gateway ne parle jamais directement au microservice ai-service : c'est le backend
# qui l'appelle via OpenFeign, comme avant.
b2u:
  backend:
    base-url: ${BACKEND_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
